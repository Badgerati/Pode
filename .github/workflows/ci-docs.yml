name: Pode CI - Docs

on:
  push:
    branches:
    - '*'
    - '!gh-pages'
    paths:
    - 'mkdocs.yml'
    - 'mkdocs-overrides/**'
    - 'docs/**'
    - '.github/workflows/ci-docs.yml'
    - 'pode.build.ps1'
    - 'src/Pode.psd1'
  pull_request:
    branches:
    - '*'
    paths:
    - 'mkdocs.yml'
    - 'mkdocs-overrides/**'
    - 'docs/**'
    - '.github/workflows/ci-docs.yml'
    - 'pode.build.ps1'
    - 'src/Pode.psd1'

env:
  INVOKE_BUILD_VERSION: '5.14.23'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x

    - name: Install Invoke-Build
      shell: pwsh
      run: |
        Install-Module -Name InvokeBuild -RequiredVersion $env:INVOKE_BUILD_VERSION -Force -SkipPublisherCheck -AllowClobber -Scope CurrentUser

    - name: Build Documentation
      shell: pwsh
      run: |
        Invoke-Build DocsBuild