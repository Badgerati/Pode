name: Pode CI - pwsh 7.5

on:
  push:
    branches:
    - '*'
    - '!gh-pages'
    paths:
    - 'src/**'
    - 'tests/**'
    - 'pode.build.ps1'
    - '.github/workflows/ci-pwsh7_5.yml'
    - 'Dockerfile'
    - '*.dockerfile'
  pull_request:
    branches:
    - '*'
    paths:
    - 'src/**'
    - 'tests/**'
    - 'pode.build.ps1'
    - '.github/workflows/ci-pwsh7_5.yml'
    - 'Dockerfile'
    - '*.dockerfile'

env:
  INVOKE_BUILD_VERSION: '5.12.2'
  POWERSHELL_VERSION: '7.5.1'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.x

    - name: Setup Powershell
      shell: PowerShell
      run: |
        Install-Module -Name InvokeBuild -RequiredVersion $env:INVOKE_BUILD_VERSION -Force
        Invoke-Build SetupPowerShell -PowerShellVersion $env:POWERSHELL_VERSION

    - name: Output PowerShell version
      shell: pwsh
      run: |
        $PSVersionTable.PSVersion

    - name: Install Invoke-Build
      shell: pwsh
      run: |
        Install-Module -Name InvokeBuild -RequiredVersion $env:INVOKE_BUILD_VERSION -Force

    - name: Run Pester Tests
      shell: pwsh
      run: |
        Invoke-Build Test

    - name: Build Packages
      shell: pwsh
      run: |
        Invoke-Build Pack