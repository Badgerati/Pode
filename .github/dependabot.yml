    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "packaging :package:"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "packaging :package:"

  - package-ecosystem: "nuget"
    directory: "/src/Listener"
