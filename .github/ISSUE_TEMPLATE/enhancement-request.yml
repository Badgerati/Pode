name: Enhancement Request
description: Suggest an enhancement for an existing feature.
labels: ['enhancement :arrow_up:']
body:
  - type: textarea
    attributes:
      label: Describe the Change
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Related Issues
      description: A clear and concise description of what the problem is, or a link/reference to the issue.
  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the enhancement request here.
